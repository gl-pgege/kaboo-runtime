name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn build
      - run: yarn typecheck
      - run: yarn test
      - run: yarn docs:api
      - run: git diff --exit-code docs/api docs/api-inventory.md
      - run: yarn docs:verify
      - run: yarn docs:llms
      - run: git diff --exit-code llms.txt llms-full.txt
      - run: yarn examples:typecheck
      - run: yarn pack --dry-run
